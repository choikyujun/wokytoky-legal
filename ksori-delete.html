<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Deletion Request — Ksori</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f6;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .langbar { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .langbar button { background: #eef4f1; border: 1px solid #d7e3dd; color: #55665f; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .langbar button.active { background: #176B54; color: #fff; border-color: #176B54; }

    .logo { font-size: 22px; font-weight: 700; color: #176B54; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
    p { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; }

    .info-box {
      background: #fef3cd; border: 1px solid #fde68a; border-radius: 8px;
      padding: 14px 16px; font-size: 13px; color: #7c5e00; line-height: 1.5; margin-bottom: 28px;
    }

    .step { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
    .step-num {
      background: #176B54; color: #fff; border-radius: 50%; min-width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin-top: 1px;
    }
    .step-text { font-size: 14px; color: #444; line-height: 1.6; }
    .step-text strong { color: #176B54; }

    .email-btn {
      display: block; width: 100%; margin-top: 28px; padding: 14px;
      background: #176B54; color: #fff; border-radius: 10px; text-decoration: none;
      text-align: center; font-size: 15px; font-weight: 600; transition: background 0.15s;
    }
    .email-btn:hover { background: #2E8B6F; }

    .divider { height: 1px; background: #eee; margin: 28px 0; }
    .note { font-size: 12px; color: #999; line-height: 1.6; }
    footer { margin-top: 24px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="langbar">
      <button data-lang="en" class="active" onclick="setLang('en')">EN</button>
      <button data-lang="ko" onclick="setLang('ko')">한국어</button>
      <button data-lang="ja" onclick="setLang('ja')">日本語</button>
    </div>

    <div class="logo">Ksori</div>
    <h1 id="title"></h1>

    <p id="intro"></p>

    <div class="info-box" id="infobox"></div>

    <div class="step"><div class="step-num">1</div><div class="step-text" id="step1"></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text" id="step2"></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text" id="step3"></div></div>

    <a class="email-btn" id="emailBtn" href="#"></a>

    <div class="divider"></div>

    <p class="note" id="note"></p>
  </div>

  <footer>&copy; 2026 Ksori. All rights reserved.</footer>

  <script>
    var T = {
      en: {
        title: 'Account Deletion Request',
        intro: 'You can delete your Ksori account directly in the app, or request deletion by email using the steps below. Email requests are processed within 3 business days.',
        infobox: 'Deleting your account permanently removes all your conversations, reviews, streaks, and subscription status. This action cannot be undone.',
        step1: 'In the app, go to <strong>Settings &gt; Delete account</strong> to delete your account immediately.',
        step2: 'To request deletion without the app, tap the button below to open your email app. Include the <strong>email address you signed up with</strong> (or write "guest" if you used guest mode).',
        step3: 'We will send a confirmation email once processing is complete.',
        btn: 'Request deletion by email',
        note: 'Your Google Play subscription is managed by Google and is not cancelled automatically; please cancel it in Google Play. Some data may be retained for the period required by applicable law. See our Privacy Policy for details.',
        subject: 'Ksori Account Deletion Request',
        body: 'Email address you signed up with (or "guest"): \nReason for deletion (optional): '
      },
      ko: {
        title: '계정 삭제 요청',
        intro: 'Ksori 계정은 앱에서 직접 삭제하거나, 아래 안내에 따라 이메일로 요청할 수 있습니다. 이메일 요청은 영업일 기준 3일 이내에 처리됩니다.',
        infobox: '계정을 삭제하면 모든 대화, 복습, 연속 기록, 구독 상태가 <strong>영구적으로 삭제</strong>되며 복구할 수 없습니다.',
        step1: '앱에서 <strong>설정 &gt; 계정 삭제</strong>로 이동하면 즉시 삭제할 수 있습니다.',
        step2: '앱 없이 요청하려면 아래 버튼을 눌러 이메일 앱을 엽니다. <strong>가입한 이메일 주소</strong>를 적어주세요(게스트로 이용한 경우 "게스트"라고 기재).',
        step3: '처리 완료 후 이메일로 확인 안내를 드립니다.',
        btn: '이메일로 삭제 요청하기',
        note: 'Google Play 구독은 Google이 관리하며 자동으로 취소되지 않으니 Google Play에서 별도로 취소해주세요. 일부 데이터는 관련 법령이 정한 기간 동안 보관될 수 있습니다. 자세한 내용은 개인정보처리방침을 참고해주세요.',
        subject: 'Ksori 계정 삭제 요청',
        body: '가입한 이메일 주소(게스트면 "게스트"): \n삭제 사유(선택): '
      },
      ja: {
        title: 'アカウント削除のご請求',
        intro: 'Ksoriアカウントはアプリから直接削除するか、以下の手順に従ってメールでご請求いただけます。メールでのご請求は営業日ベースで3日以内に処理します。',
        infobox: 'アカウントを削除すると、すべての会話、復習、連続記録、サブスクリプション状態が<strong>永久に削除</strong>され、復元できません。',
        step1: 'アプリ内の<strong>設定 &gt; アカウント削除</strong>から、すぐに削除できます。',
        step2: 'アプリなしでご請求の場合は、下のボタンを押してメールアプリを開きます。<strong>ご登録のメールアドレス</strong>をご記入ください（ゲストでご利用の場合は「ゲスト」とご記入）。',
        step3: '処理完了後、確認のメールをお送りします。',
        btn: 'メールで削除を請求する',
        note: 'Google PlayのサブスクリプションはGoogleが管理しており、自動ではキャンセルされません。Google Playで別途キャンセルしてください。一部のデータは関連法令で定められた期間保存される場合があります。詳しくはプライバシーポリシーをご参照ください。',
        subject: 'Ksori アカウント削除のご請求',
        body: 'ご登録のメールアドレス（ゲストの場合は「ゲスト」）: \n削除理由（任意）: '
      }
    };

    var cur = 'en';
    function render() {
      var t = T[cur];
      document.documentElement.lang = cur;
      document.getElementById('title').textContent = t.title;
      document.getElementById('intro').textContent = t.intro;
      document.getElementById('infobox').innerHTML = t.infobox;
      document.getElementById('step1').innerHTML = t.step1;
      document.getElementById('step2').innerHTML = t.step2;
      document.getElementById('step3').innerHTML = t.step3;
      document.getElementById('note').textContent = t.note;
      var btn = document.getElementById('emailBtn');
      btn.textContent = t.btn;
      btn.setAttribute('href', 'mailto:100bear@daum.net?subject=' + encodeURIComponent(t.subject) + '&body=' + encodeURIComponent(t.body));
      var langBtns = document.querySelectorAll('.langbar button');
      for (var i = 0; i < langBtns.length; i++) {
        langBtns[i].className = (langBtns[i].getAttribute('data-lang') === cur) ? 'active' : '';
      }
    }
    function setLang(l) { cur = l; render(); }
    render();
  </script>
</body>
</html>
