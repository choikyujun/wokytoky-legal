<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Deletion Request — WokyToky</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .langbar { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .langbar button { background: #f0f0ee; border: 1px solid #ddd; color: #666; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .langbar button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .logo { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
    p { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; }

    .info-box {
      background: #fef3cd; border: 1px solid #fde68a; border-radius: 8px;
      padding: 14px 16px; font-size: 13px; color: #7c5e00; line-height: 1.5; margin-bottom: 28px;
    }

    .step { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
    .step-num {
      background: #1a1a1a; color: #fff; border-radius: 50%; min-width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin-top: 1px;
    }
    .step-text { font-size: 14px; color: #444; line-height: 1.6; }
    .step-text strong { color: #1a1a1a; }

    .email-btn {
      display: block; width: 100%; margin-top: 28px; padding: 14px;
      background: #1a1a1a; color: #fff; border-radius: 10px; text-decoration: none;
      text-align: center; font-size: 15px; font-weight: 600; transition: background 0.15s;
    }
    .email-btn:hover { background: #333; }

    .divider { height: 1px; background: #eee; margin: 28px 0; }
    .note { font-size: 12px; color: #999; line-height: 1.6; }
    footer { margin-top: 24px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="langbar">
      <button data-lang="en" class="active" onclick="setLang('en')">EN</button>
      <button data-lang="ko" onclick="setLang('ko')">한국어</button>
      <button data-lang="ja" onclick="setLang('ja')">日本語</button>
    </div>

    <div class="logo">WokyToky</div>
    <h1 id="title"></h1>

    <p id="intro"></p>

    <div class="info-box" id="infobox"></div>

    <div class="step"><div class="step-num">1</div><div class="step-text" id="step1"></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text" id="step2"></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text" id="step3"></div></div>

    <a class="email-btn" id="emailBtn" href="#"></a>

    <div class="divider"></div>

    <p class="note" id="note"></p>
  </div>

  <footer>&copy; 2026 WokyToky. All rights reserved.</footer>

  <script>
    var T = {
      en: {
        title: 'Account Deletion Request',
        intro: 'To delete your account, please send us an email following the steps below. Requests are processed within 3 business days.',
        infobox: 'Deleting your account permanently removes all attendance records, chat history, and announcement data. This action cannot be undone.',
        step1: 'Tap the button below to open your email app.',
        step2: 'Enter <strong>"Account Deletion Request"</strong> as the subject, and include your identity information in the body.<br />· Manager: your <strong>registered email address</strong><br />· Worker: your <strong>name, company name, and the phone number registered in the app</strong>',
        step3: 'We will send a confirmation email once processing is complete.',
        btn: 'Request deletion by email',
        note: 'Even after deletion, certain data (e.g., tax invoices, payment records) may be retained for the period required by applicable law. Please see our Privacy Policy for details.',
        mailto: 'mailto:100bear@daum.net?subject=Account%20Deletion%20Request&body=Identity%20info%20%28Manager%3A%20registered%20email%20/%20Worker%3A%20name%2C%20company%20name%2C%20phone%20number%29%3A%20%0AReason%20for%20deletion%3A%20'
      },
      ko: {
        title: '계정 삭제 요청',
        intro: '계정 삭제를 원하시면 아래 안내에 따라 이메일을 보내주세요. 영업일 기준 3일 이내에 처리됩니다.',
        infobox: '계정을 삭제하면 모든 근태 기록, 채팅 내역, 공지 데이터가 <strong>영구적으로 삭제</strong>되며 복구할 수 없습니다.',
        step1: '아래 버튼을 눌러 이메일 앱을 엽니다.',
        step2: '제목에 <strong>"계정 삭제 요청"</strong>을 입력하고, 본문에 본인 확인 정보를 적어 보내주세요.<br />· 관리자(사장님): <strong>가입 이메일 주소</strong><br />· 직원: <strong>이름, 회사명, 앱에 등록된 전화번호</strong>',
        step3: '처리 완료 후 이메일로 확인 안내를 드립니다.',
        btn: '이메일로 삭제 요청하기',
        note: '삭제 처리 후에도 법적 의무에 따라 일부 데이터(세금계산서, 결제 내역 등)는 관련 법령이 정한 기간 동안 보관될 수 있습니다. 자세한 내용은 개인정보처리방침을 참고해주세요.',
        mailto: 'mailto:100bear@daum.net?subject=%EA%B3%84%EC%A0%95%20%EC%82%AD%EC%A0%9C%20%EC%9A%94%EC%B2%AD&body=%EB%B3%B8%EC%9D%B8%20%ED%99%95%EC%9D%B8%20%EC%A0%95%EB%B3%B4%20%28%EA%B4%80%EB%A6%AC%EC%9E%90%3A%20%EA%B0%80%EC%9E%85%20%EC%9D%B4%EB%A9%94%EC%9D%BC%20/%20%EC%A7%81%EC%9B%90%3A%20%EC%9D%B4%EB%A6%84%C2%B7%ED%9A%8C%EC%82%AC%EB%AA%85%C2%B7%EC%A0%84%ED%99%94%EB%B2%88%ED%98%B8%29%3A%20%0A%EC%82%AD%EC%A0%9C%20%EC%82%AC%EC%9C%A0%3A%20'
      },
      ja: {
        title: 'アカウント削除のご請求',
        intro: 'アカウントの削除をご希望の場合は、以下の手順に従ってメールをお送りください。営業日ベースで3日以内に処理します。',
        infobox: 'アカウントを削除すると、すべての勤怠記録、チャット履歴、お知らせデータが<strong>永久に削除</strong>され、復元できません。',
        step1: '下のボタンを押してメールアプリを開きます。',
        step2: '件名に<strong>「アカウント削除のご請求」</strong>と入力し、本文に本人確認情報をご記入ください。<br />· 管理者（経営者）: <strong>ご登録のメールアドレス</strong><br />· 従業員: <strong>氏名、会社名、アプリに登録した電話番号</strong>',
        step3: '処理完了後、確認のメールをお送りします。',
        btn: 'メールで削除を請求する',
        note: '削除後も、法令上の義務により一部のデータ（税務関連書類、決済履歴など）は関連法令で定められた期間保存される場合があります。詳しくはプライバシーポリシーをご参照ください。',
        mailto: 'mailto:100bear@daum.net?subject=%E3%82%A2%E3%82%AB%E3%82%A6%E3%83%B3%E3%83%88%E5%89%8A%E9%99%A4%E3%81%AE%E3%81%94%E8%AB%8B%E6%B1%82&body=%E6%9C%AC%E4%BA%BA%E7%A2%BA%E8%AA%8D%E6%83%85%E5%A0%B1%EF%BC%88%E7%AE%A1%E7%90%86%E8%80%85%3A%20%E7%99%BB%E9%8C%B2%E3%83%A1%E3%83%BC%E3%83%AB%E3%82%A2%E3%83%89%E3%83%AC%E3%82%B9%20/%20%E5%BE%93%E6%A5%AD%E5%93%A1%3A%20%E6%B0%8F%E5%90%8D%E3%83%BB%E4%BC%9A%E7%A4%BE%E5%90%8D%E3%83%BB%E9%9B%BB%E8%A9%B1%E7%95%AA%E5%8F%B7%EF%BC%89%3A%20%0A%E5%89%8A%E9%99%A4%E7%90%86%E7%94%B1%3A%20'
      }
    };

    var cur = 'en';
    function render() {
      var t = T[cur];
      document.documentElement.lang = cur;
      document.getElementById('title').textContent = t.title;
      document.getElementById('intro').textContent = t.intro;
      document.getElementById('infobox').innerHTML = t.infobox;
      document.getElementById('step1').innerHTML = t.step1;
      document.getElementById('step2').innerHTML = t.step2;
      document.getElementById('step3').innerHTML = t.step3;
      document.getElementById('note').textContent = t.note;
      var btn = document.getElementById('emailBtn');
      btn.textContent = t.btn;
      btn.setAttribute('href', t.mailto);
      var langBtns = document.querySelectorAll('.langbar button');
      for (var i = 0; i < langBtns.length; i++) {
        langBtns[i].className = (langBtns[i].getAttribute('data-lang') === cur) ? 'active' : '';
      }
    }
    function setLang(l) { cur = l; render(); }
    render();
  </script>
</body>
</html>
