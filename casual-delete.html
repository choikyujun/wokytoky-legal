<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Deletion Request — WokyToky Casual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .langbar { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .langbar button { background: #f0f0ee; border: 1px solid #ddd; color: #666; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .langbar button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .logo { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
    p { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 24px; }

    .info-box {
      background: #fef3cd; border: 1px solid #fde68a; border-radius: 8px;
      padding: 14px 16px; font-size: 13px; color: #7c5e00; line-height: 1.5; margin-bottom: 28px;
    }

    .step { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
    .step-num {
      background: #1a1a1a; color: #fff; border-radius: 50%; min-width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin-top: 1px;
    }
    .step-text { font-size: 14px; color: #444; line-height: 1.6; }
    .step-text strong { color: #1a1a1a; }

    .email-btn {
      display: block; width: 100%; margin-top: 28px; padding: 14px;
      background: #1a1a1a; color: #fff; border-radius: 10px; text-decoration: none;
      text-align: center; font-size: 15px; font-weight: 600; transition: background 0.15s;
    }
    .email-btn:hover { background: #333; }

    .divider { height: 1px; background: #eee; margin: 28px 0; }
    .note { font-size: 12px; color: #999; line-height: 1.6; }
    footer { margin-top: 24px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="langbar">
      <button data-lang="en" class="active" onclick="setLang('en')">EN</button>
      <button data-lang="ko" onclick="setLang('ko')">한국어</button>
      <button data-lang="ja" onclick="setLang('ja')">日本語</button>
    </div>

    <div class="logo">WokyToky Casual</div>
    <h1 id="title"></h1>

    <p id="intro"></p>

    <div class="info-box" id="infobox"></div>

    <div class="step"><div class="step-num">1</div><div class="step-text" id="step1"></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text" id="step2"></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text" id="step3"></div></div>

    <a class="email-btn" id="emailBtn" href="#"></a>

    <div class="divider"></div>

    <p class="note" id="note"></p>
  </div>

  <footer>&copy; 2026 WokyToky. All rights reserved.</footer>

  <script>
    var T = {
      en: {
        title: 'Record Data Deletion Request',
        intro: 'WokyToky Casual does not use personal accounts. To request deletion of room record data, you can delete it directly in the app (hosts only) or email us.',
        infobox: 'Free room records are automatically and permanently deleted 7 days after the room ends. Pro room records are retained until the host deletes them or a deletion request is made. Audio is never stored — only transcribed captions and, if the host enabled it, optional attendee information (name, affiliation, country).',
        step1: '<strong>Delete in the app (hosts only):</strong> Open <strong>My Records &rarr; See All</strong>, tap the record you want to remove, and choose Delete. This immediately removes the record for all attendees.',
        step2: '<strong>Email request (attendees or if app is inaccessible):</strong> Tap the button below to email us. Include the <strong>room code, approximate date and time, and the type of data</strong> you want deleted.',
        step3: 'We will process your request within 3 business days and send a confirmation reply.',
        btn: 'Request deletion by email',
        note: 'Data that may be deleted: transcribed caption text and optional attendee information (name, affiliation, country) collected by the host. Audio recordings are never stored. Certain data required by law may be retained for the period mandated by applicable regulations.',
        mailto: 'mailto:100bear@daum.net?subject=Record%20Data%20Deletion%20Request%20%E2%80%94%20WokyToky%20Casual&body=Room%20code%3A%20%0AApproximate%20date%20and%20time%3A%20%0AData%20to%20delete%3A%20'
      },
      ko: {
        title: '기록 데이터 삭제 요청',
        intro: 'WokyToky Casual은 개인 계정이 없는 서비스입니다. 특정 방의 기록 삭제를 원하시면 앱 내에서(방 주최자만 가능) 직접 삭제하거나 이메일로 요청해 주세요.',
        infobox: '무료 방 기록은 방 종료 후 7일이 지나면 자동으로 영구 삭제됩니다. Pro 방 기록은 주최자가 삭제하거나 삭제 요청이 있을 때까지 보관됩니다. 음성 오디오는 저장하지 않으며, 인식된 텍스트(자막)와 주최자가 수집을 설정한 경우의 참석자 정보(실명·소속·국가)만 기록됩니다.',
        step1: '<strong>앱 내 삭제 (주최자만 가능):</strong> <strong>내 기록 &rarr; 전체 보기</strong>에서 해당 기록을 탭한 후 삭제를 선택하세요. 삭제 즉시 참석자도 더 이상 해당 기록을 볼 수 없습니다.',
        step2: '<strong>이메일 요청 (참석자 또는 앱 접근 불가 시):</strong> 아래 버튼을 눌러 이메일을 보내주세요. <strong>방 코드, 대략적인 일시, 삭제 요청 데이터 종류</strong>를 포함해 주세요.',
        step3: '영업일 기준 3일 이내에 처리 후 답변 드립니다.',
        btn: '이메일로 삭제 요청하기',
        note: '삭제 가능한 데이터: 인식된 자막 텍스트 및 주최자가 수집을 설정한 경우의 참석자 정보(실명·소속·국가). 음성 녹음 파일은 저장하지 않습니다. 법적 의무에 따른 일부 데이터는 관련 법령이 정한 기간 동안 보관될 수 있습니다.',
        mailto: 'mailto:100bear@daum.net?subject=%EA%B8%B0%EB%A1%9D%20%EB%8D%B0%EC%9D%B4%ED%84%B0%20%EC%82%AD%EC%A0%9C%20%EC%9A%94%EC%B2%AD%20%E2%80%94%20WokyToky%20Casual&body=%EB%B0%A9%20%EC%BD%94%EB%93%9C%3A%20%0A%EB%8C%80%EB%9E%B5%EC%A0%81%EC%9D%B8%20%EC%9D%BC%EC%8B%9C%3A%20%0A%EC%82%AD%EC%A0%9C%20%EC%9A%94%EC%B2%AD%20%EB%8D%B0%EC%9D%B4%ED%84%B0%3A%20'
      },
      ja: {
        title: '記録データ削除のご請求',
        intro: 'WokyToky Casual はアカウント不要のサービスです。特定のルームの記録を削除したい場合は、アプリ内で（主催者のみ）直接削除するか、メールでご請求ください。',
        infobox: '無料ルームの記録はルーム終了から7日後に自動的に完全削除されます。Proルームの記録は主催者が削除するか削除請求があるまで保管されます。音声は保存されず、認識されたテキスト（字幕）と、主催者が収集を設定した場合の参加者情報（本名・所属・国）のみが記録されます。',
        step1: '<strong>アプリ内削除（主催者のみ）:</strong> <strong>マイ記録 &rarr; すべて見る</strong>で該当記録をタップして削除を選択してください。削除後、参加者もその記録を閲覧できなくなります。',
        step2: '<strong>メールでのご請求（参加者またはアプリ利用不可の場合）:</strong> 下のボタンを押してメールをお送りください。<strong>ルームコード、おおよその日時、削除希望データの種類</strong>を記載してください。',
        step3: '営業日ベースで3日以内に処理し、確認のメールをお送りします。',
        btn: 'メールで削除を請求する',
        note: '削除対象データ: 認識された字幕テキスト、および主催者が収集を設定した場合の参加者情報（本名・所属・国）。音声録音ファイルは保存されません。法令上の義務に基づき、一部データは関連法令の定める期間保存される場合があります。',
        mailto: 'mailto:100bear@daum.net?subject=%E8%A8%98%E9%8C%B2%E3%83%87%E3%83%BC%E3%82%BF%E5%89%8A%E9%99%A4%E3%81%AE%E3%81%94%E8%AB%8B%E6%B1%82%20%E2%80%94%20WokyToky%20Casual&body=%E3%83%AB%E3%83%BC%E3%83%A0%E3%82%B3%E3%83%BC%E3%83%89%3A%20%0A%E3%81%8A%E3%82%88%E3%81%9D%E3%81%AE%E6%97%A5%E6%99%82%3A%20%0A%E5%89%8A%E9%99%A4%E5%B8%8C%E6%9C%9B%E3%83%87%E3%83%BC%E3%82%BF%3A%20'
      }
    };

    var cur = 'en';
    function render() {
      var t = T[cur];
      document.documentElement.lang = cur;
      document.getElementById('title').textContent = t.title;
      document.getElementById('intro').textContent = t.intro;
      document.getElementById('infobox').innerHTML = t.infobox;
      document.getElementById('step1').innerHTML = t.step1;
      document.getElementById('step2').innerHTML = t.step2;
      document.getElementById('step3').innerHTML = t.step3;
      document.getElementById('note').textContent = t.note;
      var btn = document.getElementById('emailBtn');
      btn.textContent = t.btn;
      btn.setAttribute('href', t.mailto);
      var langBtns = document.querySelectorAll('.langbar button');
      for (var i = 0; i < langBtns.length; i++) {
        langBtns[i].className = (langBtns[i].getAttribute('data-lang') === cur) ? 'active' : '';
      }
    }
    function setLang(l) { cur = l; render(); }
    render();
  </script>
</body>
</html>
